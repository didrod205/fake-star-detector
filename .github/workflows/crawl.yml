name: Crawl

# Re-analyze today's GitHub trending every 8 hours and commit the fresh
# leaderboard so the static Pages site stays current. Uses the built-in
# GITHUB_TOKEN (kept under its ~1k req/hr budget by light sampling).
on:
  schedule:
    - cron: "23 */8 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: crawl
  cancel-in-progress: false

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm run build:data
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - run: npm run build:web
      - name: Commit refreshed leaderboard
        run: |
          git config user.name "fake-star-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add web/public/data/trending.json docs
          if git diff --staged --quiet; then
            echo "no change in the leaderboard"
          else
            git commit -m "data: refresh trending star-suspicion leaderboard [skip ci]"
            git push
          fi
